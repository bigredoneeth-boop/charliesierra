<!DOCTYPE html>

    <meta charset="UTF-8" />

    <title>CharlieSierra</title>

    <script>
      (function () {
        var path = window.location.pathname;
        var isLoginRoute = path === '/' || path === '/login';
        if (!isLoginRoute) {
          var stored = localStorage.getItem('cs_theme');
          if (stored !== 'light') {
            document.documentElement.classList.add('dark');
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
